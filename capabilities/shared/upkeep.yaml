naftiko: "1.0.0-alpha1"

info:
  label: "UpKeep API"
  description: >-
    UpKeep CMMS (Computerized Maintenance Management System) API shared
    capability definition covering work orders, assets, locations, parts,
    preventive maintenance, purchase orders, meters, requests, and webhooks.
  tags:
    - UpKeep
    - CMMS
    - Maintenance Management
    - Asset Management
    - Facility Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UPKEEP_SESSION_TOKEN: UPKEEP_SESSION_TOKEN

capability:
  consumes:
    - type: http
      namespace: upkeep
      baseUri: https://api.onupkeep.com/api/v2
      description: "UpKeep CMMS REST API"
      authentication:
        type: apikey
        key: session-token
        value: "{{UPKEEP_SESSION_TOKEN}}"
        placement: header
      resources:
        - name: work-orders
          path: /work-orders
          description: "Work order management"
          operations:
            - name: list-work-orders
              method: GET
              description: "List work orders with optional filters"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: status
                  in: query
                  type: string
                  required: false
                - name: priority
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-work-order
              method: POST
              description: "Create a new work order"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  description: "{{tools.description}}"
                  priority: "{{tools.priority}}"
                  assetId: "{{tools.assetId}}"
                  locationId: "{{tools.locationId}}"
                  assignedToId: "{{tools.assignedToId}}"
                  dueDate: "{{tools.dueDate}}"

        - name: work-order
          path: /work-orders/{id}
          description: "Individual work order operations"
          operations:
            - name: get-work-order
              method: GET
              description: "Get work order details"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-work-order
              method: PATCH
              description: "Update a work order"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  status: "{{tools.status}}"
                  priority: "{{tools.priority}}"
                  assignedToId: "{{tools.assignedToId}}"

        - name: assets
          path: /assets
          description: "Asset management"
          operations:
            - name: list-assets
              method: GET
              description: "List assets"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: locationId
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-asset
              method: POST
              description: "Create a new asset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  locationId: "{{tools.locationId}}"
                  serialNumber: "{{tools.serialNumber}}"
                  manufacturer: "{{tools.manufacturer}}"
                  model: "{{tools.model}}"

        - name: asset
          path: /assets/{id}
          description: "Individual asset operations"
          operations:
            - name: get-asset
              method: GET
              description: "Get asset details"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: preventive-maintenances
          path: /preventive-maintenances
          description: "Preventive maintenance schedules"
          operations:
            - name: list-preventive-maintenances
              method: GET
              description: "List preventive maintenance schedules"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-preventive-maintenance
              method: POST
              description: "Create a preventive maintenance schedule"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  assetId: "{{tools.assetId}}"
                  frequency: "{{tools.frequency}}"
                  startDate: "{{tools.startDate}}"

        - name: parts
          path: /parts
          description: "Parts inventory management"
          operations:
            - name: list-parts
              method: GET
              description: "List parts in inventory"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: meters
          path: /meters
          description: "Meter management"
          operations:
            - name: list-meters
              method: GET
              description: "List meters"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: requests
          path: /requests
          description: "Maintenance request management"
          operations:
            - name: list-requests
              method: GET
              description: "List maintenance requests"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-request
              method: POST
              description: "Submit a maintenance request"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  description: "{{tools.description}}"
                  assetId: "{{tools.assetId}}"
                  priority: "{{tools.priority}}"

  exposes:
    - type: rest
      port: 8100
      namespace: upkeep-api
      resources:
        - path: /v1/work-orders
          name: work-orders
          operations:
            - method: GET
              name: list-work-orders
              description: "List work orders"
              call: "upkeep.list-work-orders"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/assets
          name: assets
          operations:
            - method: GET
              name: list-assets
              description: "List assets"
              call: "upkeep.list-assets"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: upkeep-mcp
      transport: http
      tools:
        - name: list-work-orders
          description: "List maintenance work orders"
          hints:
            readOnly: true
            openWorld: false
          call: "upkeep.list-work-orders"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-work-order
          description: "Create a new maintenance work order"
          hints:
            readOnly: false
            openWorld: false
          call: "upkeep.create-work-order"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-assets
          description: "List facility assets"
          hints:
            readOnly: true
            openWorld: false
          call: "upkeep.list-assets"
          outputParameters:
            - type: object
              mapping: "$."
