          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /requests/{id}:
    get:
      operationId: getRequest
      summary: Get Request
      description: Retrieve a specific maintenance request.
      tags:
        - Requests
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Maintenance request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /webhooks:
    get:
      operationId: listWebhooks
      summary: List Webhooks
      description: Retrieve a list of webhook subscriptions.
      tags:
        - Webhooks
      responses:
        '200':
          description: List of webhooks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createWebhook
      summary: Create Webhook
      description: Create a new webhook subscription for event notifications.
      tags:
        - Webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookRequest'
      responses:
        '200':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /webhooks/{id}:
    get:
      operationId: getWebhook
      summary: Get Webhook
      description: Retrieve details of a specific webhook subscription.
      tags:
        - Webhooks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: updateWebhook
      summary: Update Webhook
      description: Update an existing webhook subscription.
      tags:
        - Webhooks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookRequest'
      responses:
        '200':
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteWebhook
      summary: Delete Webhook
      description: Delete a webhook subscription.
      tags:
        - Webhooks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Webhook deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    SessionToken:
      type: apiKey
      in: header
      name: session-token
      description: Session token obtained from POST /auth

  responses:
    Unauthorized:
      description: Session token missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          description: Error message

    SessionResponse:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
          description: Session token for subsequent API calls
        userId:
          type: string

    WorkOrder:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [open, in-progress, on-hold, complete]
        priority:
          type: string
          enum: [none, low, medium, high]
        assetId:
          type: string
        locationId:
          type: string
        assignedToId:
          type: string
        dueDate:
          type: string
          format: date
        estimatedHours:
          type: number
        actualHours:
          type: number
        category:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    WorkOrderList:
      type: object
      properties:
        success:
          type: boolean
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrder'

    WorkOrderRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [open, in-progress, on-hold, complete]
        priority:
          type: string
          enum: [none, low, medium, high]
        assetId:
          type: string
        locationId:
          type: string
        assignedToId:
          type: string
        dueDate:
          type: string
          format: date
        estimatedHours:
          type: number

    Asset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        serialNumber:
          type: string
        model:
          type: string
        manufacturer:
          type: string
        locationId:
          type: string
        purchaseDate:
          type: string
          format: date
        purchaseCost:
          type: number
        status:
          type: string
          enum: [operational, needs-repair, decommissioned]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AssetList:
      type: object
      properties:
        success:
          type: boolean
        total:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/Asset'

    AssetRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        serialNumber:
          type: string
        model:
          type: string
        manufacturer:
          type: string
        locationId:
          type: string
        purchaseDate:
          type: string
          format: date
        purchaseCost:
          type: number

    DowntimeEvent:
      type: object
      properties:
        id:
          type: string
        assetId:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        downtimeStatusId:
          type: string
        duration:
          type: integer
          description: Duration in minutes
        notes:
          type: string

    Location:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        parentId:
          type: string
        createdAt:
          type: string
          format: date-time

    LocationList:
      type: object
      properties:
        success:
          type: boolean
        total:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/Location'

    LocationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        address:
          type: string
        parentId:
          type: string

    Part:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        partNumber:
          type: string
        quantity:
          type: integer
        unitCost:
          type: number
        minimumQuantity:
          type: integer
        locationId:
          type: string
        createdAt:
          type: string
          format: date-time

    PartList:
      type: object
      properties:
        success:
          type: boolean
        total:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/Part'

    PartRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        partNumber:
          type: string
        quantity:
          type: integer
        unitCost:
          type: number
        minimumQuantity:
          type: integer

    PreventiveMaintenance:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        assetId:
          type: string
        locationId:
          type: string
        frequency:
          type: string
          enum: [daily, weekly, monthly, quarterly, annually, custom]
        startDate:
          type: string
          format: date
        assignedToId:
          type: string
        estimatedHours:
          type: number
        active:
          type: boolean

    PreventiveMaintenanceList:
      type: object
      properties:
        success:
          type: boolean
        total:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/PreventiveMaintenance'

    PreventiveMaintenanceRequest:
      type: object
      required:
        - title
        - frequency
        - startDate
      properties:
        title:
          type: string
        description:
          type: string
        assetId:
          type: string
        locationId:
          type: string
        frequency:
          type: string
          enum: [daily, weekly, monthly, quarterly, annually, custom]
        startDate:
          type: string
          format: date
        assignedToId:
          type: string
        estimatedHours:
          type: number

    PurchaseOrder:
      type: object
      properties:
        id:
          type: string
        poNumber:
          type: string
        vendorId:
          type: string
        status:
          type: string
          enum: [draft, pending, approved, received, cancelled]
        totalCost:
          type: number
        lineItems:
          type: array
          items:
            type: object
            properties:
              partId:
                type: string
              quantity:
                type: integer
              unitCost:
                type: number
        createdAt:
          type: string
          format: date-time

    PurchaseOrderList:
      type: object
      properties:
        success:
          type: boolean
        total:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseOrder'

    PurchaseOrderRequest:
      type: object
      required:
        - vendorId
        - lineItems
      properties:
        vendorId:
          type: string
        lineItems:
          type: array
          items:
            type: object
            required:
              - partId
              - quantity
            properties:
              partId:
                type: string
              quantity:
                type: integer
              unitCost:
                type: number

    Meter:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        assetId:
          type: string
        unit:
          type: string
          description: Unit of measurement (e.g., hours, miles, cycles)
        currentReading:
          type: number
        lastReadingDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    MeterList:
      type: object
      properties:
        success:
          type: boolean
        total:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/Meter'

    MeterRequest:
      type: object
      required:
        - name
        - assetId
        - unit
      properties:
        name:
          type: string
        assetId:
          type: string
        unit:
          type: string

    MeterReading:
      type: object
      properties:
        id:
          type: string
        meterId:
          type: string
        value:
          type: number
        readingDate:
          type: string
          format: date-time
        notes:
          type: string

    MaintenanceRequest:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [open, pending, cancelled, complete]
        assetId:
          type: string
        locationId:
          type: string
        priority:
          type: string
          enum: [none, low, medium, high]
        createdAt:
          type: string
          format: date-time

    RequestList:
      type: object
      properties:
        success:
          type: boolean
        total:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/MaintenanceRequest'

    MaintenanceRequestBody:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        assetId:
          type: string
        locationId:
          type: string
        priority:
          type: string
          enum: [none, low, medium, high]

    Webhook:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
          description: Event types to subscribe to (e.g., work_order.created, asset.updated)
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    WebhookList:
      type: object
      properties:
        success:
          type: boolean
        results:
          type: array
          items:
            $ref: '#/components/schemas/Webhook'

    WebhookRequest:
      type: object
      required:
        - url
        - events
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        active:
          type: boolean
          default: true

security:
  - SessionToken: []
