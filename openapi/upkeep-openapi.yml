        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /meters/{id}/readings:
    post:
      operationId: submitMeterReading
      summary: Submit Meter Reading
      description: Submit a new reading for a meter.
      tags:
        - Meters
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Meter identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - value
                - readingDate
              properties:
                value:
                  type: number
                  description: Meter reading value
                readingDate:
                  type: string
                  format: date-time
                notes:
                  type: string
      responses:
        '200':
          description: Meter reading recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeterReading'
        '400':
          $ref: '#/components/responses/BadRequest'
