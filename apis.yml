aid: upkeep
name: UpKeep
description: >-
  UpKeep is an asset operations management and CMMS (Computerized Maintenance
  Management System) platform for maintenance teams and facility managers.
  The UpKeep API provides programmatic access to work orders, assets, locations,
  preventive maintenance schedules, parts inventory, purchase orders, meters,
  requests, and webhooks.
