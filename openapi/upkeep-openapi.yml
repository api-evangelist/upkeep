          in: path
          required: true
          schema:
            type: string
          description: Asset identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - startTime
                - downtimeStatusId
              properties:
                startTime:
                  type: string
                  format: date-time
                endTime:
                  type: string
                  format: date-time
                downtimeStatusId:
                  type: string
                  description: Downtime status category identifier
                notes:
                  type: string
      responses:
        '200':
          description: Downtime event recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DowntimeEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
