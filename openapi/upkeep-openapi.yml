  /meters:
    get:
      operationId: listMeters
      summary: List Meters
      description: Retrieve a list of meters.
      tags:
        - Meters
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
      responses:
        '200':
